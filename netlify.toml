[build]
  publish = "."

# Headers for JS files in other games
[[headers]]
  for = "/pages/games/angrybirds/*.js"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Content-Type = "application/javascript"

# Redirects for FNF Goose Mod
[[redirects]]
  from = "/pages/games/fnf-goose-mod/*"
  to = "/pages/games/fnf-goose-mod/:splat"
  status = 200

[[redirects]]
  from = "/fnf-goose-mod/*"
  to = "/pages/games/fnf-goose-mod/:splat"
  status = 200
  force = true

# 🔥 Critical catch-all redirect for static proxies and SPA behavior
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
